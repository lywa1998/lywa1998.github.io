name: Build and Deploy Pages

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Dioxus CLI
        run: cargo binstall --no-confirm dioxus-cli@0.7.3

      - name: Clean previous web output
        run: rm -rf target/dx/*/release/web/public target/dx/*/web/public || true

      - name: Build web app
        run: RUSTC_WRAPPER= dx build --platform web --release

      - name: Collect static files
        shell: bash
        run: |
          set -euo pipefail

          OUT_DIR="$(find target/dx -maxdepth 4 -type d -path '*/release/web/public' | head -n1 || true)"
          if [ -z "$OUT_DIR" ]; then
            OUT_DIR="$(find target/dx -maxdepth 4 -type d -path '*/web/public' | head -n1 || true)"
          fi
          if [ -z "$OUT_DIR" ] && [ -d dist ]; then
            OUT_DIR="dist"
          fi
          if [ -z "$OUT_DIR" ] && [ -d public ]; then
            OUT_DIR="public"
          fi

          if [ -z "$OUT_DIR" ]; then
            echo "Could not find Dioxus web output directory."
            echo "Checked target/dx/*/(release/)web/public, dist, public"
            exit 1
          fi

          rm -rf site
          mkdir -p site
          cp -R "$OUT_DIR"/* site/

          # SPA fallback and Pages compatibility.
          cp site/index.html site/404.html
          touch site/.nojekyll

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
