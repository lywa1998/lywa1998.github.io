name: Build and Deploy Pages

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Dioxus CLI
        run: cargo binstall --no-confirm dioxus-cli@0.7.1

      - name: Build web app
        run: dx build --platform web --release

      - name: Collect static files
        shell: bash
        run: |
          set -euo pipefail

          APP_NAME="$(grep -m1 '^name\s*=\s*"' Cargo.toml | sed -E 's/name\s*=\s*"([^"]+)"/\1/')"

          CANDIDATES=(
            "target/dx/${APP_NAME}/release/web/public"
            "target/dx/${APP_NAME}/web/public"
            "dist"
            "public"
          )

          OUT_DIR=""
          for dir in "${CANDIDATES[@]}"; do
            if [ -d "$dir" ]; then
              OUT_DIR="$dir"
              break
            fi
          done

          if [ -z "$OUT_DIR" ]; then
            echo "Could not find Dioxus web output directory."
            echo "Checked: ${CANDIDATES[*]}"
            exit 1
          fi

          rm -rf site
          mkdir -p site
          cp -R "$OUT_DIR"/* site/

          # Adapt static paths for GitHub Pages project sites (/repo-name).
          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO="${GITHUB_REPOSITORY##*/}"
          if [ "$REPO" = "${OWNER}.github.io" ]; then
            BASE_PATH=""
          else
            BASE_PATH="/${REPO}"
          fi

          if [ -n "$BASE_PATH" ]; then
            export BASE_PATH
            python3 -c $'from pathlib import Path\nimport os\nimport re\n\nbase = os.environ["BASE_PATH"]\n\nfor html_file in Path("site").rglob("*.html"):\n    text = html_file.read_text(encoding="utf-8")\n    if "<base href=" not in text and "<head>" in text:\n        text = text.replace("<head>", f"<head>\\n    <base href=\\"{base}/\\">", 1)\n    text = re.sub(r"(\\b(?:href|src)=[\\"\\\'])/(?!/)", rf"\\1{base}/", text)\n    html_file.write_text(text, encoding="utf-8")\n\nfor js_file in Path("site").rglob("*.js"):\n    text = js_file.read_text(encoding="utf-8")\n    text = text.replace(\'"/assets/\', f\'"{base}/assets/\')\n    text = text.replace("\'/assets/", f"\'{base}/assets/")\n    js_file.write_text(text, encoding="utf-8")\n\nfor css_file in Path("site").rglob("*.css"):\n    text = css_file.read_text(encoding="utf-8")\n    text = text.replace("url(/assets/", f"url({base}/assets/")\n    css_file.write_text(text, encoding="utf-8")'
          fi

          # GitHub Pages static hosting helpers.
          cp site/index.html site/404.html
          touch site/.nojekyll

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
